name: PR Checks

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Taskfile.yml'
              - '.golangci.yml'
              - '.github/workflows/**'
            helm:
              - 'deploy/charts/**'
              - '.github/postgres-manifests.yaml'
              - 'ct.yaml'
            docs:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'docs/**'
              - '.swaggo'

  spellcheck:
    name: Spellcheck
    uses: ./.github/workflows/spellcheck.yml

  linting:
    name: Linting
    needs: changes
    if: needs.changes.outputs.go == 'true'
    uses: ./.github/workflows/lint.yml

  security-scan:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.go == 'true'
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/security-scan.yml

  tests:
    name: Tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    uses: ./.github/workflows/test.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  codegen:
    name: Verify Generated Files
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/verify-gen.yml

  helm-charts:
    name: Helm Charts
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.helm == 'true'
    uses: ./.github/workflows/helm-charts-test.yml

  # Gate job: single required status check that accounts for skipped jobs
  pr-checks-pass:
    name: PR Checks Pass
    runs-on: ubuntu-latest
    needs:
      - spellcheck
      - linting
      - security-scan
      - tests
      - codegen
      - helm-charts
    if: always()
    steps:
      - name: Check job results
        run: |
          # Fail if any needed job failed or was cancelled
          results=( \
            "${{ needs.spellcheck.result }}" \
            "${{ needs.linting.result }}" \
            "${{ needs.security-scan.result }}" \
            "${{ needs.tests.result }}" \
            "${{ needs.codegen.result }}" \
            "${{ needs.helm-charts.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "One or more jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
