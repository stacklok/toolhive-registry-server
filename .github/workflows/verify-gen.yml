name: Verify Generated Files

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-generated-files:
    name: Verify Generated Files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.44.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install codegen tools
        run: task install-codegen
      - name: Install swag
        run: task install-swagger
      - name: Generate code files
        run: task gen
      - name: Check for codegen changes
        run: |
          if ! git diff --exit-code -- . ':!docs/'; then
            echo "❌ Generated code files are not up to date!"
            echo "Please run 'task gen' and commit the changes."
            exit 1
          else
            echo "✅ Generated code files are up to date!"
          fi
      - name: Verify docs
        run: ./cmd/help/verify.sh
