name: Verify Generated Files

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-generated-files:
    name: Verify Generated Files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.44.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install codegen tools
        run: task install-codegen
      - name: Install swag
        run: task install-swagger
      - name: Generate code files
        run: task gen
      - name: Check for codegen changes
        run: |
          if ! git diff --exit-code -- . ':!docs/'; then
            echo "❌ Generated code files are not up to date!"
            echo "Please run 'task gen' and commit the changes."
            exit 1
          else
            echo "✅ Generated code files are up to date!"
          fi
      - name: Verify docs
        run: ./cmd/help/verify.sh
