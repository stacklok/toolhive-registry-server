name: Security Scan

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  grype-repo-scan:
    name: Grype Repository Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Grype vulnerability scanner
        id: grype-scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "."
          output-format: "sarif"
          fail-build: "true"
          only-fixed: "true"
          severity-cutoff: "high"
          # The grype bundled with scan-action v7.4.0 (0.110.0) catalogs Go
          # modules from go.sum, so it flags github.com/docker/docker even though
          # the toolhive v0.29.0 bump removed it from go.mod and the build (it
          # lingers only as a go.sum checksum via indirect deps). Newer grype
          # catalogs from go.mod only, matching reality. Drop this pin once
          # scan-action ships a release bundling grype >= 0.112.0.
          grype-version: "v0.112.0"

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: "grype"

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          repo-checkout: false
          go-version-input: 'stable'
          go-package: ./...
          output-format: json
          output-file: govulncheck-output.json

      - name: Check for vulnerabilities (with exclusions)
        run: |
          # The GO-2026-4883 / GO-2026-4887 (docker/docker daemon advisories) are
          # resolved by the toolhive v0.29.0 bump, which drops github.com/docker/docker
          # from the build (toolhive migrated to github.com/moby/moby/{client,api},
          # toolhive#5420) — no suppression needed.
          #
          # TEMPORARY: GO-2026-5037 / GO-2026-5038 / GO-2026-5039 are Go standard
          # library advisories (crypto/x509, mime, net/textproto) fixed in Go 1.26.4.
          # CI's `stable` Go currently resolves 1.26.3 because the actions/go-versions
          # manifest has not published 1.26.4 yet. Ignore them only until `stable`
          # picks up 1.26.4 and we have verified govulncheck is clean against it, then
          # REMOVE these three entries.
          IGNORED_VULNS="GO-2026-5037 GO-2026-5038 GO-2026-5039"

          # Show the raw output for debugging
          echo "::group::govulncheck raw output"
          cat govulncheck-output.json
          echo "::endgroup::"

          # Extract vulnerability IDs that have actual findings (called symbols)
          FOUND_VULNS=$(jq -r 'select(.finding != null) | .finding.osv' govulncheck-output.json | sort -u | grep -E '^GO-' || true)

          if [ -z "$FOUND_VULNS" ]; then
            echo "✅ No vulnerabilities found"
            exit 0
          fi

          echo "Found vulnerabilities: $FOUND_VULNS"

          # Check if all found vulnerabilities are in the ignore list
          UNIGNORED=""
          for vuln in $FOUND_VULNS; do
            if ! echo "$IGNORED_VULNS" | grep -qw "$vuln"; then
              UNIGNORED="$UNIGNORED $vuln"
            fi
          done
          UNIGNORED=$(echo "$UNIGNORED" | xargs)

          if [ -z "$UNIGNORED" ]; then
            echo "⚠️  All vulnerabilities are ignored: $FOUND_VULNS"
            exit 0
          fi

          echo "❌ Vulnerabilities need attention: $UNIGNORED"
          exit 1
