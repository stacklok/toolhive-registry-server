name: Tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  # Packages that use testcontainers (Docker) — split into balanced groups
  # and run in parallel via a matrix so no single job takes 8+ minutes.
  db-tests:
    name: "DB Tests (${{ matrix.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: db-sqlc
            packages: ./internal/db/sqlc
          - name: service-db
            packages: ./internal/service/db
          - name: sync-writer
            packages: ./internal/sync/writer
          - name: misc
            packages: >-
              ./database
              ./cmd/thv-registry-api/app
              ./internal/app/storage
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb # v2.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.44.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run database tests with coverage
        run: task test-coverage PACKAGES="${{ matrix.packages }}" COVERPROFILE="coverage-${{ matrix.name }}.out"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: coverage-${{ matrix.name }}
          path: coverage-${{ matrix.name }}.out
          retention-days: 1
          if-no-files-found: ignore

  # All remaining packages — pure unit tests that don't need Docker.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # Packages handled by db-tests matrix above.
      DB_TEST_PACKAGES: >-
        ./database
        ./cmd/thv-registry-api/app
        ./internal/app/storage
        ./internal/db/sqlc
        ./internal/service/db
        ./internal/sync/writer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb # v2.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.44.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package list excluding DB tests
        id: packages
        run: |
          # Convert relative paths to full module paths for exact matching
          MODULE="github.com/stacklok/toolhive-registry-server"
          EXCLUDE_PATTERN=$(echo "$DB_TEST_PACKAGES" | tr -s ' \n' '\n' | sed "s|^./|${MODULE}/|" | paste -sd '|' -)
          PACKAGES=$(go list ./... | grep -Ev "^(${EXCLUDE_PATTERN})$" | tr '\n' ' ')
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Run unit tests with coverage
        run: task test-coverage PACKAGES="${{ steps.packages.outputs.packages }}" COVERPROFILE="coverage-unit.out"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1
          if-no-files-found: ignore

  # Merge coverage reports and upload to Codecov.
  upload-coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [db-tests, unit-tests]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-*

      - name: Merge coverage reports
        run: |
          # Merge available coverage files into one.
          # Each file starts with a "mode:" header line that should appear only once.
          echo "mode: atomic" > coverage.out
          for f in coverage-*/coverage-*.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: stacklok/toolhive-registry-server
          files: coverage.out

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Run integration tests
        run: go test -tags integration -v -count=1 -timeout 300s ./internal/authz/
