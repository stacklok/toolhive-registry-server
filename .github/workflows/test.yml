name: Tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  # Packages that use testcontainers (Docker) — split into balanced groups
  # and run in parallel via a matrix so no single job takes 8+ minutes.
  db-tests:
    name: "DB Tests (${{ matrix.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: db-sqlc
            packages: ./internal/db/sqlc
          - name: service-db
            packages: ./internal/service/db
          - name: sync
            packages: ./internal/sync/writer ./internal/sync/state
          - name: misc
            packages: >-
              ./database
              ./cmd/thv-registry-api/app
              ./internal/app/storage
              ./internal/authz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb # v2.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run database tests with coverage
        run: |
          go test -count 1 -ldflags=-extldflags=-Wl,-w -race -json \
            -coverprofile=coverage-${{ matrix.name }}.out \
            ${{ matrix.packages }} | gotestfmt -hide "all"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-${{ matrix.name }}
          path: coverage-${{ matrix.name }}.out
          retention-days: 1

  # All remaining packages — pure unit tests that don't need Docker.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # Packages handled by db-tests matrix above.
      DB_TEST_PACKAGES: >-
        ./database
        ./cmd/thv-registry-api/app
        ./internal/app/storage
        ./internal/authz
        ./internal/db/sqlc
        ./internal/service/db
        ./internal/sync/state
        ./internal/sync/writer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb # v2.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package list excluding DB tests
        id: packages
        run: |
          # Convert relative paths to full module paths for exact matching
          MODULE="github.com/stacklok/toolhive-registry-server"
          EXCLUDE_PATTERN=$(echo "$DB_TEST_PACKAGES" | tr -s ' \n' '\n' | sed "s|^./|${MODULE}/|" | paste -sd '|' -)
          PACKAGES=$(go list ./... | grep -Ev "^(${EXCLUDE_PATTERN})$" | tr '\n' ' ')
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Run unit tests with coverage
        run: |
          go test -count 1 -ldflags=-extldflags=-Wl,-w -race -json \
            -coverprofile=coverage-unit.out \
            ${{ steps.packages.outputs.packages }} | gotestfmt -hide "all"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1

  # Merge coverage reports and upload to Codecov.
  upload-coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [db-tests, unit-tests]
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*

      - name: Merge coverage reports
        run: |
          # Merge available coverage files into one.
          # Each file starts with a "mode:" header line that should appear only once.
          echo "mode: set" > coverage.out
          for f in coverage-*/coverage-*.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: stacklok/toolhive-registry-server
          files: coverage.out

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Run integration tests
        run: go test -tags integration -v -count=1 -timeout 300s ./internal/authz/
