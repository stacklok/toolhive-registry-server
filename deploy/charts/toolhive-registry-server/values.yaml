# Default values for toolhive-registry-server.
# This is a YAML-formatted file.

# -- Number of replicas
replicaCount: 1

image:
  # -- URL of the registry server image
  registryServerUrl: "ghcr.io/stacklok/thv-registry-api:v1.2.1"

  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: "toolhive-registry-server"

# -- Annotations to add to the pod
podAnnotations: {}

# -- Labels to add to the pod
podLabels: {}

# -- Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65535
  seccompProfile:
    type: RuntimeDefault

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 8080
  # -- Service annotations
  annotations: {}

# -- Resource requests and limits (matching operator defaults)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: internal-http
  initialDelaySeconds: 30
  periodSeconds: 10

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readiness
    port: internal-http
  initialDelaySeconds: 5
  periodSeconds: 5

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Init containers to run before the main container
# Use this for setup tasks like preparing pgpass files, waiting for dependencies, etc.
# Init containers share the same volumes as the main container (extraVolumes)
initContainers: []
  # Example: pgpass init container for PostgreSQL authentication
  # - name: pgpass-init
  #   image: cgr.dev/chainguard/busybox:latest
  #   command:
  #     - sh
  #     - -c
  #     - |
  #       cp /pgpass-secret/.pgpass /pgpass-prepared/.pgpass
  #       chmod 600 /pgpass-prepared/.pgpass
  #   securityContext:
  #     allowPrivilegeEscalation: false
  #     capabilities:
  #       drop:
  #         - ALL
  #     readOnlyRootFilesystem: true
  #     runAsNonRoot: true
  #     runAsUser: 65535
  #   volumeMounts:
  #     - name: pgpass-secret
  #       mountPath: /pgpass-secret
  #       readOnly: true
  #     - name: pgpass-prepared
  #       mountPath: /pgpass-prepared

# ==============================================================================
# Registry Server Configuration
# ==============================================================================
# This section is rendered directly as the config.yaml file for the registry server.
# Any valid registry server configuration can be added here.
# See: https://github.com/stacklok/toolhive-registry-server/blob/main/docs/configuration.md
#
# The entire config block is rendered as YAML into the ConfigMap, so you can add
# any new fields without modifying the chart templates.

config:
  # Sources configuration - at least one source must be configured
  sources:
    - name: toolhive
      git:
        repository: https://github.com/stacklok/toolhive-catalog.git
        branch: main
        path: pkg/catalog/toolhive/data/registry-legacy.json
      syncPolicy:
        interval: "30m"

  # Registries configuration - at least one registry must be configured
  registries:
    - name: default
      sources: ["toolhive"]

  # Authentication configuration
  auth:
    mode: anonymous

  # PostgreSQL database configuration (required)
  # WARNING: Do NOT set password or migrationPassword here — this config block is
  # rendered into a Kubernetes ConfigMap, which is not encrypted at rest.
  # Instead, provide passwords via environment variables using extraEnv with
  # secretKeyRef (see the extraEnv section below for examples).
  # Supported password methods:
  #   1. Environment variables: THV_REGISTRY_DATABASE_PASSWORD (see extraEnv below)
  #   2. PostgreSQL's pgpass file (~/.pgpass or $PGPASSFILE)
  #   3. Dynamic auth (e.g., AWS RDS IAM) via the dynamicAuth config block
  # See: https://www.postgresql.org/docs/current/libpq-pgpass.html
  database:
    host: localhost
    port: 5432
    user: thv_user
    database: toolhive_registry
    sslMode: require

